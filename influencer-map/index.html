<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spartan Trail — Partner & Influencer Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0e0e0e;color:#e0e0e0;display:flex;flex-direction:column;height:100vh;overflow:hidden}

    /* HEADER */
    .header{background:#131313;border-bottom:1px solid #222;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:100}
    .header img{height:32px;filter:brightness(0) invert(1)}
    .header h1{font-size:14px;font-weight:700;color:#fff;letter-spacing:.04em}
    .header-stats{margin-left:auto;display:flex;gap:12px}
    .stat-pill{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;font-size:11px;color:#aaa}
    .stat-pill span{color:#81c9c0;font-weight:700}

    /* LAYOUT */
    .body{display:flex;flex:1;overflow:hidden}

    /* SIDEBAR */
    .sidebar{width:340px;background:#131313;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
    .sidebar-top{padding:12px;border-bottom:1px solid #1e1e1e;flex-shrink:0}
    .search-row{display:flex;gap:8px;margin-bottom:10px}
    .search-row input{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:8px 12px;font-size:13px;color:#e0e0e0;outline:none}
    .search-row input:focus{border-color:#81c9c0}
    .btn-add{background:#81c9c0;color:#0e0e0e;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
    .btn-add:hover{background:#6ab8af}

    /* RACE LOGOS */
    .race-logos-label{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
    .race-logos-label span{color:#444;font-size:9px;font-weight:400;text-transform:none;letter-spacing:0}
    .race-logos{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .race-logo-chip{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:4px 6px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;position:relative}
    .race-logo-chip img{height:26px;max-width:80px;object-fit:contain;filter:brightness(0) invert(1);opacity:.7;transition:opacity .15s}
    .race-logo-chip:hover img,.race-logo-chip.active img{opacity:1}
    .race-logo-chip:hover,.race-logo-chip.active{border-color:#81c9c0;background:#1a2a2a}
    .race-logo-chip.active{box-shadow:0 0 0 1px #81c9c0}
    .promo-dot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:#81c9c0;display:none}
    .promo-dot.has-promo{display:block}

    /* RACE DETAIL PANEL */
    .race-detail-panel{display:none;background:#101818;border:1px solid #1e3030;border-radius:10px;padding:12px;margin-bottom:10px}
    .race-detail-panel.open{display:block}
    .race-detail-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .race-detail-header img{height:22px;filter:brightness(0) invert(1);opacity:.9}
    .race-detail-title{font-size:12px;font-weight:700;color:#81c9c0;flex:1}
    .race-detail-date{font-size:10px;color:#555}
    /* promo table */
    .rdp-promo-section{margin-bottom:8px}
    .rdp-promo-header{display:grid;grid-template-columns:1fr 80px 90px 70px 22px;gap:4px;margin-bottom:4px}
    .rdp-promo-header span{font-size:9px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.06em}
    .rdp-promo-row{display:grid;grid-template-columns:1fr 80px 90px 70px 22px;gap:4px;margin-bottom:4px;align-items:center}
    .rdp-promo-row input{background:#0e0e0e;border:1px solid #1e2e2e;border-radius:5px;padding:5px 7px;font-size:11px;color:#e0e0e0;outline:none;font-family:inherit;width:100%}
    .rdp-promo-row input:focus{border-color:#81c9c0}
    .btn-del-promo{background:none;border:1px solid #2a2a2a;border-radius:4px;color:#555;font-size:12px;cursor:pointer;padding:0;width:22px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .btn-del-promo:hover{border-color:#e06060;color:#e06060}
    .btn-add-promo{background:none;border:1px dashed #2a4040;border-radius:5px;color:#81c9c0;font-size:11px;cursor:pointer;padding:4px 8px;width:100%;margin-top:2px;text-align:left}
    .btn-add-promo:hover{border-color:#81c9c0;background:#0e1818}
    /* notes + save */
    .rdp-notes{margin-top:8px}
    .rdp-notes label{display:block;font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .rdp-notes textarea{width:100%;background:#0e0e0e;border:1px solid #1e2e2e;border-radius:6px;padding:6px 9px;font-size:12px;color:#e0e0e0;outline:none;font-family:inherit;resize:vertical;min-height:48px}
    .rdp-notes textarea:focus{border-color:#81c9c0}
    .rdp-save-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
    .rdp-saved{font-size:10px;color:#81c9c0;opacity:0;transition:opacity .3s}
    .rdp-saved.show{opacity:1}
    .btn-rdp-save{background:#81c9c0;color:#0e0e0e;border:none;border-radius:6px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer}
    .btn-rdp-save:hover{background:#6ab8af}

    /* FILTER ROW */
    .filter-row{display:flex;gap:8px;margin-bottom:8px}
    .filter-row select{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:6px 10px;font-size:12px;color:#e0e0e0;outline:none;cursor:pointer}
    .filter-row select:focus{border-color:#81c9c0}

    /* CATEGORY FILTERS */
    .cat-label{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    .cat-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
    .cat-chip{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
    .cat-chip:hover{border-color:#555}
    .cat-chip.active{border-color:#81c9c0;background:#1a2a2a;color:#81c9c0}
    .cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

    /* SORT ROW */
    .sort-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
    .sort-row label{font-size:11px;color:#666;white-space:nowrap}
    .sort-row select{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:4px 8px;font-size:11px;color:#ccc;outline:none;cursor:pointer;flex:1}

    /* LIST */
    .contact-list{flex:1;overflow-y:auto;padding:8px}
    .contact-list::-webkit-scrollbar{width:4px}
    .contact-list::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px}
    .no-results{padding:40px 20px;text-align:center;color:#444;font-size:13px}

    /* CONTACT CARD */
    .contact-card{background:#1a1a1a;border:1px solid #242424;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
    .contact-card:hover{border-color:#333;background:#1e1e1e}
    .contact-card.selected{border-color:#81c9c0;background:#142222}
    .card-top{display:flex;align-items:flex-start;gap:8px}
    .card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
    .card-name{font-size:13px;font-weight:700;color:#fff;flex:1;line-height:1.3}
    .status-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
    .status-new{background:#1a1a2a;color:#888;border:1px solid #333}
    .status-contacted{background:#1a2030;color:#7ab0e0;border:1px solid #2a4060}
    .status-responded{background:#2a1a30;color:#c07ae0;border:1px solid #5a2a70}
    .status-confirmed{background:#1a2a1a;color:#81c9c0;border:1px solid #2a5a2a}
    .status-partner{background:#2a2010;color:#e0c070;border:1px solid #5a4a20}
    .card-sub{font-size:11px;color:#666;margin-top:3px;padding-left:18px}
    .card-race{display:inline-flex;align-items:center;gap:4px;background:#1e2a2a;border:1px solid #2a4040;border-radius:12px;padding:2px 8px;font-size:10px;color:#81c9c0;margin-top:5px;margin-left:18px}
    .card-race img{height:14px;filter:brightness(0) invert(1);opacity:.8}
    .card-contact-info{display:flex;gap:10px;margin-top:6px;padding-left:18px}
    .card-contact-link{font-size:11px;color:#555;text-decoration:none;display:flex;align-items:center;gap:3px}
    .card-contact-link:hover{color:#81c9c0}
    .card-contact-link svg{opacity:.7}
    .card-followers{font-size:11px;color:#555;margin-top:4px;padding-left:18px}
    .card-notes-preview{font-size:11px;color:#666;margin-top:5px;border-left:2px solid #2a2a2a;padding-left:10px;margin-left:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
    .card-actions{display:flex;gap:6px;margin-top:8px;padding-left:18px}
    .btn-sm{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:6px;padding:4px 10px;font-size:11px;color:#888;cursor:pointer;transition:all .15s}
    .btn-sm:hover{border-color:#81c9c0;color:#81c9c0}
    .btn-sm.danger:hover{border-color:#e06060;color:#e06060}

    /* NOTES INLINE */
    .notes-area{display:none;margin-top:8px;padding-left:18px}
    .notes-area textarea{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:6px 8px;font-size:11px;color:#ccc;resize:vertical;min-height:56px;outline:none;font-family:inherit}
    .notes-area textarea:focus{border-color:#81c9c0}
    .notes-save-row{display:flex;justify-content:flex-end;margin-top:4px}
    .btn-save-notes{background:#81c9c0;color:#0e0e0e;border:none;border-radius:6px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer}

    /* MAP */
    #map{flex:1;z-index:1;height:100%}
    .leaflet-container{background:#1a1a1a}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;width:460px;max-width:94vw;max-height:88vh;overflow-y:auto;padding:24px}
    .modal h2{font-size:16px;font-weight:700;margin-bottom:18px;color:#fff}
    .form-row{margin-bottom:12px}
    .form-row label{display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
    .form-row input,.form-row select,.form-row textarea{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:9px 12px;font-size:13px;color:#e0e0e0;outline:none;font-family:inherit}
    .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#81c9c0}
    .form-row textarea{resize:vertical;min-height:68px}
    .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
    .btn-cancel{background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:9px 18px;font-size:13px;color:#888;cursor:pointer}
    .btn-cancel:hover{border-color:#555;color:#ccc}
    .btn-submit{background:#81c9c0;border:none;border-radius:8px;padding:9px 22px;font-size:13px;font-weight:700;color:#0e0e0e;cursor:pointer}
    .btn-submit:hover{background:#6ab8af}

    /* LEGEND */
    .legend{position:absolute;bottom:16px;right:16px;z-index:400;background:rgba(13,13,13,.92);border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;font-size:11px;backdrop-filter:blur(6px)}
    .legend-title{font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-size:10px}
    .legend-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;color:#aaa}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .legend-race-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;background:#81c9c0}
  </style>
</head>
<body>

<div class="header">
  <img src="logos/st-logo.png" alt="Spartan Trail"/>
  <h1>Partner & Influencer Map</h1>
  <div class="header-stats">
    <div class="stat-pill">Total: <span id="total-count">0</span></div>
    <div class="stat-pill">Confirmed: <span id="confirmed-count">0</span></div>
  </div>
</div>

<div class="body">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Search name, location, handle…"/>
        <button class="btn-add" onclick="openModal()">+ Add</button>
      </div>

      <div class="race-logos-label">
        Filter by Race
        <span>click logo for promo codes</span>
      </div>
      <div class="race-logos" id="race-logos"></div>

      <!-- RACE DETAIL / PROMO PANEL -->
      <div class="race-detail-panel" id="race-detail-panel">
        <div class="race-detail-header">
          <img id="rdp-logo" src="" alt=""/>
          <div class="race-detail-title" id="rdp-title"></div>
          <div class="race-detail-date" id="rdp-date"></div>
        </div>
        <div class="rdp-promo-section">
          <div class="rdp-promo-header">
            <span>Promo Code</span><span>Discount</span><span>Expiry</span><span>Max Uses</span><span></span>
          </div>
          <div id="rdp-promo-rows"></div>
          <button class="btn-add-promo" onclick="addPromoRow()">+ Add Promo Code</button>
        </div>
        <div class="rdp-notes">
          <label>Race Notes</label>
          <textarea id="rdp-notes" placeholder="Registration link, key contacts, goals, talking points…"></textarea>
        </div>
        <div class="rdp-save-row">
          <span class="rdp-saved" id="rdp-saved">Saved ✓</span>
          <button class="btn-rdp-save" onclick="saveRaceDetail()">Save</button>
        </div>
      </div>

      <div class="filter-row">
        <select id="radius-select" onchange="applyFilters()">
          <option value="">All distances</option>
          <option value="5">Within 5 mi</option>
          <option value="10">Within 10 mi</option>
          <option value="15">Within 15 mi</option>
          <option value="20">Within 20 mi</option>
          <option value="30">Within 30 mi</option>
          <option value="40">Within 40 mi</option>
          <option value="50">Within 50 mi</option>
        </select>
        <select id="status-filter" onchange="applyFilters()">
          <option value="">All statuses</option>
          <option value="not-contacted">Not Contacted</option>
          <option value="contacted">Contacted</option>
          <option value="responded">Responded</option>
          <option value="confirmed">Confirmed</option>
          <option value="partner">Partner</option>
        </select>
      </div>

      <div class="cat-label">Category</div>
      <div class="cat-filters" id="cat-filters"></div>

      <div class="sort-row">
        <label>Sort:</label>
        <select id="sort-select" onchange="applyFilters()">
          <option value="name">Name A–Z</option>
          <option value="status">Status</option>
          <option value="race">Race</option>
          <option value="followers">Followers</option>
        </select>
      </div>
    </div>

    <div class="contact-list" id="contact-list">
      <div class="no-results">Loading…</div>
    </div>
  </div>

  <div style="flex:1;position:relative;display:flex;flex-direction:column">
    <div id="map" style="flex:1"></div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Add Contact</h2>
    <input type="hidden" id="edit-id"/>
    <div class="form-row">
      <label>Name / Business *</label>
      <input type="text" id="f-name" placeholder="e.g. Fleet Feet San Jose"/>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0">
        <label>Category *</label>
        <select id="f-category"></select>
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label>Status</label>
        <select id="f-status">
          <option value="not-contacted">Not Contacted</option>
          <option value="contacted">Contacted</option>
          <option value="responded">Responded</option>
          <option value="confirmed">Confirmed</option>
          <option value="partner">Partner</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Race</label>
      <select id="f-race"></select>
    </div>
    <div class="form-row">
      <label>Location *</label>
      <input type="text" id="f-location" placeholder="City, State"/>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0">
        <label>Latitude *</label>
        <input type="number" id="f-lat" placeholder="37.3382" step="0.0001"/>
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label>Longitude *</label>
        <input type="number" id="f-lng" placeholder="-121.8863" step="0.0001"/>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0">
        <label>Phone</label>
        <input type="tel" id="f-phone" placeholder="(408) 555-0100"/>
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label>Email</label>
        <input type="email" id="f-email" placeholder="owner@runstore.com"/>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0">
        <label>Instagram</label>
        <input type="text" id="f-ig" placeholder="@handle"/>
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label>Followers</label>
        <input type="text" id="f-followers" placeholder="e.g. 12.4K"/>
      </div>
    </div>
    <div class="form-row">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Key contact name, relationship, talking points…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="saveContact()">Save</button>
    </div>
  </div>
</div>

<script>
// ── RACES ─────────────────────────────────────────────────────────────
const RACES = [
  { id:'whitewater',    name:'Whitewater Trail Challenge',  short:'Whitewater',   date:'Jun 20, 2026', lat:43.0,    lng:-88.2,    logo:'logos/st-logo.png' },
  { id:'blue-mountain', name:'Blue Mountain Trail Run',     short:'Blue Mtn',     date:'Jul 12, 2026', lat:40.8217, lng:-75.5157, logo:'logos/blue-mountain.png' },
  { id:'wasatch',       name:'Wasatch Scramble Trail Run',  short:'Wasatch',      date:'Jul 12, 2026', lat:41.2,    lng:-111.8,   logo:'logos/wasatch.png' },
  { id:'lake-placid',   name:'Lake Placid Trail Challenge', short:'Lake Placid',  date:'Aug 8, 2026',  lat:44.2198, lng:-73.9204, logo:'logos/lake-placid.png' },
  { id:'calabogie',     name:'Calabogie Peaks Trail Run',   short:'Calabogie',    date:'Aug 23, 2026', lat:45.264,  lng:-76.787,  logo:'logos/calabogie.png' },
  { id:'country-roads', name:'Country Roads Trail Run',     short:'Cntry Roads',  date:'Aug 30, 2026', lat:37.975,  lng:-81.133,  logo:'logos/country-roads.png' },
  { id:'san-jose',      name:'San Jose Trail Challenge',    short:'San Jose',     date:'Sep 27, 2026', lat:37.2336, lng:-122.009, logo:'logos/san-jose.png' },
  { id:'rancho-ramble', name:'Rancho Ramble Trail Run',     short:'Rancho',       date:'Nov 8, 2026',  lat:34.0,    lng:-118.3,   logo:'logos/rancho-ramble.png' },
  { id:'golden-gate',   name:'Golden Gate Trail Classic',   short:'Golden Gate',  date:'Jan 23, 2027', lat:37.8399, lng:-122.483, logo:'logos/golden-gate.png' },
  { id:'georgia-grit',  name:'Georgia Grit Trail Run',      short:'GA Grit',      date:'Mar 14, 2027', lat:33.678,  lng:-83.906,  logo:'logos/georgia-grit.png' },
  { id:'toro-park',     name:'Toro Park Trail Run',          short:'Toro Park',    date:'May 30, 2027', lat:36.613,  lng:-121.699, logo:'logos/toro-park.png' },
];

// ── CATEGORIES ────────────────────────────────────────────────────────
const CATS = [
  { id:'influencer',         label:'Influencer',       color:'#e07a81' },
  { id:'run-club',           label:'Run Club',          color:'#81c9c0' },
  { id:'running-store',      label:'Running Store',     color:'#7ab0e0' },
  { id:'trail-org',          label:'Trail Org',         color:'#c07ae0' },
  { id:'school-track',       label:'School / Track',    color:'#e0c070' },
  { id:'crossfit-gym',       label:'CrossFit / Gym',    color:'#e09060' },
  { id:'outdoor-retail',     label:'Outdoor Retail',    color:'#90c070' },
  { id:'corporate-wellness', label:'Corp. Wellness',    color:'#a0a0e0' },
  { id:'past-participant',   label:'Past Participant',  color:'#e0e0a0' },

function renderPromoRows(rows){
  const container = document.getElementById('rdp-promo-rows');
  container.innerHTML = '';
  (rows||[]).forEach((r,i)=>{
    const div = document.createElement('div');
    div.className = 'rdp-promo-row';
    div.innerHTML = `
      <input type="text"  class="pr-code"    placeholder="TRAILBRAD20"  value="${(r.code||'').replace(/"/g,'&quot;')}"/>
      <input type="text"  class="pr-discount" placeholder="20% or $10" value="${(r.discount||'').replace(/"/g,'&quot;')}"/>
      <input type="date"  class="pr-expiry"  value="${r.expiry||''}"/>
      <input type="text"  class="pr-maxuses" placeholder="50 or ∞"     value="${(r.maxuses||'').replace(/"/g,'&quot;')}"/>
      <button class="btn-del-promo" onclick="removePromoRow(${i})" title="Remove">✕</button>`;
    container.appendChild(div);
  });

function getPromoRows(){
  return Array.from(document.querySelectorAll('#rdp-promo-rows .rdp-promo-row')).map(row=>({
    code:     row.querySelector('.pr-code').value.trim(),
    discount: row.querySelector('.pr-discount').value.trim(),
    expiry:   row.querySelector('.pr-expiry').value,
    maxuses:  row.querySelector('.pr-maxuses').value.trim(),
  })).filter(r=>r.code||r.discount||r.expiry||r.maxuses);
}
function addPromoRow(){
  const d = raceData[activeRaceDetail] || {};
  const rows = [...(d.promoCodes||[]), {code:'',discount:'',expiry:'',maxuses:''}];
  renderPromoRows(rows);
}
function removePromoRow(idx){
  const rows = getPromoRows();
  rows.splice(idx,1);
  renderPromoRows(rows);
}
function openRaceDetail(raceId){
  const race = raceById(raceId);
  activeRaceDetail = raceId;
  document.getElementById('rdp-logo').src    = race.logo;
  document.getElementById('rdp-title').textContent = race.name;
  document.getElementById('rdp-date').textContent  = race.date;
  const d = raceData[raceId] || {};
  // migrate old single-code format
  let promoCodes = d.promoCodes || [];
  if(!promoCodes.length && (d.code||d.discount)){
    promoCodes = [{code:d.code||'',discount:d.discount||'',expiry:d.expiry||'',maxuses:d.maxuses||''}];
  }
  if(!promoCodes.length) promoCodes = [{code:'',discount:'',expiry:'',maxuses:''}];
  renderPromoRows(promoCodes);
  document.getElementById('rdp-notes').value = d.notes || '';
  document.getElementById('rdp-saved').classList.remove('show');
  document.getElementById('race-detail-panel').classList.add('open');
}
function closeRaceDetail(){
  activeRaceDetail = null;
  document.getElementById('race-detail-panel').classList.remove('open');
}
function saveRaceDetail(){
  if(!activeRaceDetail) return;
  raceData[activeRaceDetail] = {
    promoCodes: getPromoRows(),
    notes: document.getElementById('rdp-notes').value.trim(),
  };
  saveRaceData(raceData);
  renderRaceLogos();
  const saved = document.getElementById('rdp-saved');
  saved.classList.add('show');
  setTimeout(()=>saved.classList.remove('show'), 2000);
}
function hasPromo(raceId){
  const d=raceData[raceId]||{};
  return !!(d.notes||(d.promoCodes&&d.promoCodes.some(p=>p.code||p.discount))||(d.code));
}

// ── RENDER RACE LOGOS ──────────────────────────────────────────────────
function renderRaceLogos(){
  const container = document.getElementById('race-logos');
  container.innerHTML = '';
  RACES.forEach(r=>{
    const chip = document.createElement('div');
    chip.className = 'race-logo-chip' + (selectedRaces.has(r.id)?' active':'');
    chip.title = r.name + ' — ' + r.date + ' (click to filter + view promo)';
    chip.innerHTML = `<img src="${r.logo}" alt="${r.short}" onerror="this.style.display='none'"/>
      <span class="promo-dot${hasPromo(r.id)?' has-promo':''}"></span>`;
    chip.onclick = ()=>toggleRace(r.id);
    container.appendChild(chip);
  });
}

function toggleRace(id){
  if(selectedRaces.has(id)){
    selectedRaces.delete(id);
    if(activeRaceDetail===id) closeRaceDetail();
  } else {
    selectedRaces.add(id);
    openRaceDetail(id);
  }
  if(selectedRaces.size===1) openRaceDetail([...selectedRaces][0]);
  else if(selectedRaces.size===0) closeRaceDetail();
  renderRaceLogos();
  applyFilters();
}

// ── RENDER CATEGORY FILTERS ────────────────────────────────────────────
function renderCatFilters(){
  const container = document.getElementById('cat-filters');
  container.innerHTML='';
  CATS.forEach(c=>{
    if(!contacts.some(x=>x.category===c.id)) return;
    const chip = document.createElement('div');
    chip.className='cat-chip'+(selectedCats.has(c.id)?' active':'');
    chip.innerHTML=`<span class="cat-dot" style="background:${c.color}"></span>${c.label}`;
    chip.onclick=()=>{ if(selectedCats.has(c.id)) selectedCats.delete(c.id); else selectedCats.add(c.id); renderCatFilters(); applyFilters(); };
    container.appendChild(chip);
  });
}

// ── HAVERSINE ─────────────────────────────────────────────────────────
function haversine(lat1,lng1,lat2,lng2){
  const R=3958.8, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── FILTER + SORT ─────────────────────────────────────────────────────
function applyFilters(){
  const q       = document.getElementById('search-input').value.toLowerCase().trim();
  const radiusMi= parseFloat(document.getElementById('radius-select').value)||0;
  const statusF = document.getElementById('status-filter').value;
  const sortBy  = document.getElementById('sort-select').value;

  let filtered = contacts.filter(c=>{
    if(selectedRaces.size && !selectedRaces.has(c.race)) return false;
    if(selectedCats.size  && !selectedCats.has(c.category)) return false;
    if(statusF && c.status !== statusF) return false;
    if(q){ const hay=[c.name,c.location,c.ig,c.category,c.notes].join(' ').toLowerCase(); if(!hay.includes(q)) return false; }
    if(radiusMi){
      const race=raceById(c.race);
      if(!race||!race.lat) return false;
      if(haversine(c.lat,c.lng,race.lat,race.lng) > radiusMi) return false;
    }
    return true;
  });

  filtered.sort((a,b)=>{
    if(sortBy==='status')    return (STATUS_ORDER[a.status]||0)-(STATUS_ORDER[b.status]||0);
    if(sortBy==='race')      return (a.race||'').localeCompare(b.race||'');
    if(sortBy==='followers'){ const fn=s=>parseFloat((s||'0').replace(/[^\d.]/g,''))||0; return fn(b.followers)-fn(a.followers); }
    return a.name.localeCompare(b.name);
  });

  renderList(filtered);
  renderMapMarkers(filtered);
  updateStats();
}

function toggleNotes(id){
  const el=document.getElementById('notes-'+id);
  el.style.display=el.style.display==='block'?'none':'block';
  if(el.style.display==='block') document.getElementById('notesta-'+id).focus();
}
function saveNotes(id){
  const ta=document.getElementById('notesta-'+id);
  const c=contacts.find(x=>x.id===id);
  if(c){ c.notes=ta.value; saveContacts(contacts); applyFilters(); }
}
function cycleStatus(id){
  const order=['not-contacted','contacted','responded','confirmed','partner'];
  const c=contacts.find(x=>x.id===id); if(!c) return;
  c.status=order[(order.indexOf(c.status)+1)%order.length];
  saveContacts(contacts); applyFilters();
}
function deleteContact(id){
  if(!confirm('Remove this contact?')) return;
  contacts=contacts.filter(c=>c.id!==id);
  if(selectedId===id) selectedId=null;
  saveContacts(contacts); renderCatFilters(); applyFilters();
}

// ── MAP MARKERS ────────────────────────────────────────────────────────
function renderMapMarkers(filtered){
  Object.values(mapMarkers).forEach(m=>map.removeLayer(m));
  mapMarkers={};
  filtered.forEach(c=>{
    if(!c.lat||!c.lng) return;
    const race=raceById(c.race);
    const m=L.marker([c.lat,c.lng],{icon:makeContactIcon(c.category,c.status)}).addTo(map);
    m.bindTooltip(`<b>${c.name}</b><br/>${statusLabel(c.status)}${race.short?' · '+race.short:''}`,{className:'leaflet-tooltip',direction:'top'});
    m.on('click',()=>selectContact(c.id));
    mapMarkers[c.id]=m;
  });
}

function selectContact(id){
  selectedId=selectedId===id?null:id;
  document.querySelectorAll('.contact-card').forEach(el=>{
    el.classList.toggle('selected', el.id==='card-'+selectedId);
  });
  if(selectedId&&mapMarkers[selectedId]){
    const c=contacts.find(x=>x.id===selectedId);
    map.setView([c.lat,c.lng],13,{animate:true});
    mapMarkers[selectedId].openTooltip();
    const cardEl=document.getElementById('card-'+selectedId);
    if(cardEl) cardEl.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

function openEditModal(id){

  document.getElementById('edit-id').value=id;
  ['name','location','phone','email','ig','followers','notes'].forEach(f=>document.getElementById('f-'+f).value=c[f]||'');

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function saveContact(){
  const name=document.getElementById('f-name').value.trim();
  const lat=parseFloat(document.getElementById('f-lat').value);
  const lng=parseFloat(document.getElementById('f-lng').value);
  if(!name){alert('Name is required.');return;}
  if(isNaN(lat)||isNaN(lng)){alert('Valid latitude and longitude are required.');return;}
  const id=document.getElementById('edit-id').value;
  const obj={
    id:id||'c'+Date.now(), name,
    category:document.getElementById('f-category').value,
    status:  document.getElementById('f-status').value,
    race:    document.getElementById('f-race').value,
    location:document.getElementById('f-location').value.trim(),
    lat,lng,
    phone:   document.getElementById('f-phone').value.trim(),
    email:   document.getElementById('f-email').value.trim(),
    ig:      document.getElementById('f-ig').value.trim(),
    followers:document.getElementById('f-followers').value.trim(),
    notes:   document.getElementById('f-notes').value.trim(),
  };
  if(id){ const idx=contacts.findIndex(c=>c.id===id); if(idx>-1) contacts[idx]=obj; else contacts.push(obj); }
  else contacts.push(obj);
  saveContacts(contacts); closeModal(); renderCatFilters(); renderLegend(); applyFilters();
}
document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
document.getElementById('search-input').addEventListener('input',applyFilters);

// ── INIT ──────────────────────────────────────────────────────────────
populateSelects();
renderRaceLogos();
renderCatFilters();
renderLegend();
applyFilters();
</script>
