<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- DaisyUI + Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body { margin:0; padding:0; height:100%; background:#131313; }
    #root { display:flex; height:100vh; overflow:hidden; }

    /* Spartan Trail Dark Theme */
    :root { --teal:#81c9c0; --bg:#131313; --surface:#1c1c1c; --border:#272727; --text:#e2e2e2; --muted:#888; }
    body { background:var(--bg) !important; color:var(--text); }
    .bg-surface { background:var(--surface); }
    .border-st { border-color:var(--border) !important; }
    .text-teal { color:var(--teal); }

    /* Sidebar */
    #sidebar { width:320px; min-width:320px; display:flex; flex-direction:column; background:var(--bg); border-right:1px solid var(--border); z-index:10; }
    #map { flex:1; }

    /* Cards */
    .inf-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:8px; cursor:pointer; transition:border-color .15s; }
    .inf-card:hover, .inf-card.selected { border-color:var(--teal); }
    .inf-card.selected { background:#1f2d2c; }

    /* Inputs */
    input[type="text"], input[type="number"], select, textarea {
      background:var(--surface) !important; border:1px solid var(--border) !important;
      color:var(--text) !important; border-radius:6px; padding:6px 10px; width:100%; font-size:13px;
    }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--teal) !important; }
    input::placeholder { color:#555; }
    label { font-size:11px; color:#aaa; display:block; margin-bottom:3px; }

    /* Tabs */
    .tab-btn { padding:5px 14px; border-radius:5px; font-size:12px; font-weight:600; cursor:pointer; border:none; transition:.15s; }
    .tab-btn.active { background:var(--teal); color:#131313; }
    .tab-btn:not(.active) { background:transparent; color:#888; }

    /* Buttons */
    .btn-teal { background:var(--teal); color:#131313; border:none; border-radius:6px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; }
    .btn-teal:hover { background:#6ab8af; }
    .btn-ghost-sm { background:transparent; color:#aaa; border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer; }
    .btn-ghost-sm:hover { background:var(--surface); }

    /* Badges */
    .badge { display:inline-block; padding:2px 7px; border-radius:99px; font-size:10px; font-weight:700; }
    .badge-teal { background:var(--teal); color:#131313; }
    .badge-amber { background:#f59e0b; color:#131313; }
    .badge-orange { background:#fb923c; color:#131313; }
    .badge-ghost { background:#272727; color:#aaa; }
    .badge-outline-teal { border:1px solid var(--teal); color:var(--teal); background:transparent; }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:1000; display:flex; align-items:center; justify-content:center; }
    .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; width:480px; max-width:95vw; max-height:90vh; overflow-y:auto; }

    /* Scrollbar */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }

    /* Leaflet overrides */
    .leaflet-popup-content-wrapper { background:#1c1c1c !important; color:#e2e2e2 !important; border:1px solid #272727; box-shadow:0 4px 20px rgba(0,0,0,.6) !important; }
    .leaflet-popup-tip { background:#1c1c1c !important; }
    .leaflet-popup-content b { color:#81c9c0; }
    .leaflet-control-zoom a { background:#1c1c1c !important; color:#81c9c0 !important; border-color:#272727 !important; }
    .leaflet-control-attribution { background:rgba(19,19,19,.8) !important; color:#555 !important; }
    .leaflet-control-attribution a { color:#81c9c0 !important; }

    .range-input { accent-color:var(--teal); width:100%; }
    .divider { border-color:var(--border); }
  </style>
</head>

// ─── Storage ───────────────────────────────────────────────────────────────────

function loadInfluencers() {
  const stored = localStorage.getItem('st_influencers');
  if (stored) return JSON.parse(stored);
  const data = SEED_INFLUENCERS.map((s, i) => ({ ...s, id: i + 1 }));
  saveInfluencers(data);
  return data;
}

function saveInfluencers(data) {
  localStorage.setItem('st_influencers', JSON.stringify(data));
}

// ─── Helpers ───────────────────────────────────────────────────────────────────

function haversineMiles(lat1, lng1, lat2, lng2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtFollowers(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

function nearestRace(inf) {
  let best = { race: RACES[0], miles: Infinity };
  RACES.forEach(r => {
    const miles = haversineMiles(inf.lat, inf.lng, r.lat, r.lng);
    if (miles < best.miles) best = { race: r, miles };
  });
  return best;
}

// ─── App State ─────────────────────────────────────────────────────────────────

let state = {
  influencers: loadInfluencers(),
  search: '',
  minFollowers: 0,
  selectedRace: null,
  maxMiles: 500,
  selectedInf: null,
  showAdd: false,
  showFilters: false,
  activeTab: 'all',   // 'all' | 'high'
  addForm: { name:'', handle:'', followers:'', location:'', lat:'', lng:'', tags:'', instagram:'', notes:'', priority:'1' },
};

let map = null;
let influencerMarkers = {};

// ─── Map ───────────────────────────────────────────────────────────────────────

function initMap() {
  map = L.map('map', { center: [38, -96], zoom: 4 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19,
  }).addTo(map);

  RACES.forEach(race => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:13px;height:13px;border-radius:50%;background:#81c9c0;border:2px solid #fff;box-shadow:0 0 5px rgba(0,0,0,.6)"></div>`,
      iconSize: [13, 13], iconAnchor: [6, 6],
    });
    L.marker([race.lat, race.lng], { icon }).addTo(map)
      .bindPopup(`<b style="font-size:13px">${race.name}</b><br/>${race.location}<br/><i style="color:#888">${race.date}</i>${race.target ? `<br/>Target: <b>${race.target.toLocaleString()} runners</b>` : ''}`)
      .on('click', () => { state.selectedRace = race; state.showFilters = true; render(); });
  });

  updateInfluencerMarkers();
}

function updateInfluencerMarkers() {
  if (!map) return;
  Object.values(influencerMarkers).forEach(m => map.removeLayer(m));
  influencerMarkers = {};

  state.influencers.forEach(inf => {
    if (!inf.lat || !inf.lng) return;
    const sz = inf.followers >= 25000 ? 14 : inf.followers >= 10000 ? 11 : 8;
    const color = inf.priority === 1 ? '#f59e0b' : '#fb923c';
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,.5)"></div>`,
      iconSize: [sz, sz], iconAnchor: [sz/2, sz/2],
    });
    const nr = nearestRace(inf);
    const m = L.marker([inf.lat, inf.lng], { icon }).addTo(map)
      .bindPopup(`<b>${inf.name}</b><br/>${inf.handle}<br/>${fmtFollowers(inf.followers)} followers<br/>${inf.location}<br/>Nearest: <b>${nr.race.name}</b> (${Math.round(nr.miles)} mi)`)
      .on('click', () => { state.selectedInf = inf.id; render(); });
    influencerMarkers[inf.id] = m;
  });
}

function flyToInf(inf) {
  if (!map || !inf.lat || !inf.lng) return;
  map.flyTo([inf.lat, inf.lng], 8, { duration: 1 });
  influencerMarkers[inf.id]?.openPopup();
}

// ─── Render ────────────────────────────────────────────────────────────────────

function filteredInfluencers() {
  return state.influencers.filter(inf => {
    if (state.activeTab === 'high' && inf.priority !== 1) return false;
    const q = state.search.toLowerCase();
    if (q && !inf.name.toLowerCase().includes(q) && !inf.handle.toLowerCase().includes(q)) return false;
    if (inf.followers < state.minFollowers) return false;
    if (state.selectedRace) {
      const miles = haversineMiles(inf.lat, inf.lng, state.selectedRace.lat, state.selectedRace.lng);
      if (miles > state.maxMiles) return false;
    }
    return true;
  });
}

function renderModal() {
  const existing = document.getElementById('add-modal');
  if (existing) existing.remove();

  if (!state.showAdd) return;

  const f = state.addForm;
  const el = document.createElement('div');
  el.id = 'add-modal';
  el.className = 'modal-overlay';
  el.innerHTML = `
    <div class="modal-box" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="margin:0;font-size:16px;font-weight:700;color:#e2e2e2">Add Influencer</h3>
        <button onclick="closeAdd()" style="background:transparent;border:none;color:#aaa;cursor:pointer;font-size:20px;line-height:1">×</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="grid-column:span 2">
          <label>Name *</label>
          <input type="text" id="af-name" value="${f.name}" placeholder="Full name"/>
        </div>
        <div>
          <label>Instagram Handle *</label>
          <input type="text" id="af-handle" value="${f.handle}" placeholder="@handle"/>
        </div>
        <div>
          <label>Followers</label>
          <input type="number" id="af-followers" value="${f.followers}" placeholder="e.g. 12000"/>
        </div>
        <div style="grid-column:span 2">
          <label>Location</label>
          <input type="text" id="af-location" value="${f.location}" placeholder="City, State"/>
        </div>
        <div>
          <label>Latitude</label>
          <input type="number" id="af-lat" value="${f.lat}" placeholder="e.g. 40.015" step="any"/>
        </div>
        <div>
          <label>Longitude</label>
          <input type="number" id="af-lng" value="${f.lng}" placeholder="e.g. -105.27" step="any"/>
        </div>
        <div style="grid-column:span 2">
          <label>Tags (comma-separated)</label>
          <input type="text" id="af-tags" value="${f.tags}" placeholder="trail,local,women"/>
        </div>
        <div style="grid-column:span 2">
          <label>Instagram URL</label>
          <input type="text" id="af-instagram" value="${f.instagram}" placeholder="https://instagram.com/..."/>
        </div>
        <div style="grid-column:span 2">
          <label>Notes</label>
          <textarea id="af-notes" rows="3" placeholder="Why this person?">${f.notes}</textarea>
        </div>
        <div>
          <label>Priority</label>
          <select id="af-priority">
            <option value="1" ${f.priority==='1'?'selected':''}>High Priority</option>
            <option value="2" ${f.priority==='2'?'selected':''}>Outreach</option>
          </select>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
        <button class="btn-ghost-sm" onclick="closeAdd()">Cancel</button>
        <button class="btn-teal" onclick="saveInfluencer()">Save</button>
      </div>
    </div>
  `;
  el.addEventListener('click', closeAdd);
  document.body.appendChild(el);
}

function render() {
  renderSidebar();
  renderModal();
}

// ─── Actions ───────────────────────────────────────────────────────────────────

function selectInf(id) {
  state.selectedInf = state.selectedInf === id ? null : id;
  const inf = state.influencers.find(i => i.id === id);
  if (inf && state.selectedInf === id) flyToInf(inf);
  render();
}

function selectRace(id) {
  const r = RACES.find(r => r.id === Number(id));
  state.selectedRace = r || null;
  if (r && map) map.flyTo([r.lat, r.lng], 6, { duration: 1 });
  render();
}

function clearFilters() {
  state.selectedRace = null;
  state.minFollowers = 0;
  state.maxMiles = 500;
  render();
}

function openAdd() { state.showAdd = true; render(); }
function closeAdd() { state.showAdd = false; render(); }

function saveInfluencer() {
  const name = document.getElementById('af-name').value.trim();
  const handle = document.getElementById('af-handle').value.trim();
  if (!name || !handle) { alert('Name and handle are required.'); return; }

  const newInf = {
    id: Math.max(0, ...state.influencers.map(i => i.id)) + 1,
    name,
    handle,
    followers: parseInt(document.getElementById('af-followers').value) || 0,
    location: document.getElementById('af-location').value.trim(),
    lat: parseFloat(document.getElementById('af-lat').value) || 0,
    lng: parseFloat(document.getElementById('af-lng').value) || 0,
    tags: document.getElementById('af-tags').value.trim(),
    instagram: document.getElementById('af-instagram').value.trim(),
    notes: document.getElementById('af-notes').value.trim(),
    priority: parseInt(document.getElementById('af-priority').value) || 2,
  };

  state.influencers.push(newInf);
  saveInfluencers(state.influencers);
  updateInfluencerMarkers();
  state.showAdd = false;
  state.addForm = { name:'', handle:'', followers:'', location:'', lat:'', lng:'', tags:'', instagram:'', notes:'', priority:'1' };
  render();
}

// ─── Init ──────────────────────────────────────────────────────────────────────

document.getElementById('root').innerHTML = `
  <div id="sidebar"></div>
  <div id="map"></div>
`;

render();
initMap();
</script>
</body>
</html>
