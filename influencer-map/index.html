<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spartan Trail — Local Partner Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin:0; padding:0; height:100%; background:#131313; color:#e2e2e2; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    #root { display:flex; height:100vh; overflow:hidden; }

    :root {
      --teal:#81c9c0;
      --bg:#131313;
      --surface:#1c1c1c;
      --surface2:#222;
      --border:#2a2a2a;
      --text:#e2e2e2;
      --muted:#888;
    }

    /* ── Sidebar ── */
    #sidebar { width:340px; min-width:340px; display:flex; flex-direction:column; background:var(--bg); border-right:1px solid var(--border); z-index:10; overflow:hidden; }
    #map { flex:1; }

    /* ── Cards ── */
    .partner-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:11px 12px; margin-bottom:7px; cursor:pointer; transition:border-color .15s, background .15s; }
    .partner-card:hover { border-color:var(--teal); }
    .partner-card.selected { border-color:var(--teal); background:#1e2928; }

    /* ── Inputs ── */
    input[type="text"], input[type="number"], select, textarea {
      background:var(--surface) !important; border:1px solid var(--border) !important;
      color:var(--text) !important; border-radius:6px; padding:6px 10px; width:100%; font-size:13px;
    }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--teal) !important; }
    input::placeholder, textarea::placeholder { color:#444; }
    label { font-size:11px; color:#999; display:block; margin-bottom:3px; }

    /* ── Buttons ── */
    .btn-teal { background:var(--teal); color:#131313; border:none; border-radius:6px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; }
    .btn-teal:hover { background:#6ab8af; }
    .btn-ghost { background:transparent; color:#999; border:1px solid var(--border); border-radius:6px; padding:5px 12px; font-size:12px; cursor:pointer; }
    .btn-ghost:hover { background:var(--surface); color:#ddd; }

    /* ── Badges ── */
    .badge { display:inline-block; padding:2px 8px; border-radius:99px; font-size:10px; font-weight:700; white-space:nowrap; }
    .badge-teal { background:var(--teal); color:#131313; }
    .badge-ghost { background:#252525; color:#aaa; }
    .badge-outline { border:1px solid var(--teal); color:var(--teal); background:transparent; }

    /* ── Tab strip ── */
    .tab-strip { display:flex; gap:3px; background:#1a1a1a; padding:4px; border-radius:7px; }
    .tab-btn { flex:1; padding:5px 4px; border-radius:5px; font-size:11px; font-weight:600; cursor:pointer; border:none; transition:.15s; text-align:center; }
    .tab-btn.active { background:var(--teal); color:#131313; }
    .tab-btn:not(.active) { background:transparent; color:#666; }
    .tab-btn:not(.active):hover { color:#aaa; }

    /* ── Modal ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:1000; display:flex; align-items:center; justify-content:center; }
    .modal-box { background:#1e1e1e; border:1px solid var(--border); border-radius:12px; padding:22px; width:500px; max-width:96vw; max-height:90vh; overflow-y:auto; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }

    /* ── Leaflet ── */
    .leaflet-popup-content-wrapper { background:#1c1c1c !important; color:#e2e2e2 !important; border:1px solid #2a2a2a; box-shadow:0 4px 20px rgba(0,0,0,.7) !important; border-radius:8px !important; }
    .leaflet-popup-tip { background:#1c1c1c !important; }
    .leaflet-popup-content { margin:10px 12px !important; }
    .leaflet-control-zoom a { background:#1c1c1c !important; color:#81c9c0 !important; border-color:#2a2a2a !important; }
    .leaflet-control-attribution { background:rgba(19,19,19,.8) !important; color:#555 !important; }
    .leaflet-control-attribution a { color:#81c9c0 !important; }

    .range-input { accent-color:var(--teal); width:100%; cursor:pointer; }
    .section-hd { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#555; margin-bottom:6px; }

    /* ── Category chip colors ── */
    .cat-influencer    { background:#f59e0b22; color:#f59e0b; border:1px solid #f59e0b55; }
    .cat-run-club      { background:#a78bfa22; color:#a78bfa; border:1px solid #a78bfa55; }
    .cat-running-store { background:#34d39922; color:#34d399; border:1px solid #34d39955; }
    .cat-trail-org     { background:#60a5fa22; color:#60a5fa; border:1px solid #60a5fa55; }
    .cat-school        { background:#f472b622; color:#f472b6; border:1px solid #f472b655; }
    .cat-crossfit      { background:#fb923c22; color:#fb923c; border:1px solid #fb923c55; }
    .cat-outdoor       { background:#818cf822; color:#818cf8; border:1px solid #818cf855; }
    .cat-corporate     { background:#94a3b822; color:#94a3b8; border:1px solid #94a3b855; }
    .cat-past          { background:#fcd34d22; color:#fcd34d; border:1px solid #fcd34d55; }
    .cat-other         { background:#6b728022; color:#9ca3af; border:1px solid #6b728055; }

    .pill-btn { padding:4px 10px; border-radius:99px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid transparent; transition:.12s; background:#1c1c1c; color:#777; }
    .pill-btn.on { color:#131313; border-color:transparent; }
    .pill-btn:not(.on):hover { border-color:#444; color:#bbb; }
  </style>
</head>

  { category:'running-store', name:'Fleet Feet San Jose', handle:'', followers:0, location:'San Jose, CA', lat:37.3000, lng:-121.9200, tags:'bayarea,fleet-feet,retail', instagram:'', notes:'Fleet Feet franchise in Bay Area. Target for San Jose race outreach.', priority:1 },
  { category:'running-store', name:'Road Runner Sports',  handle:'', followers:0, location:'San Jose, CA', lat:37.3220, lng:-121.9480, tags:'bayarea,retail,running', instagram:'', notes:'Large Bay Area running retailer. Potential co-promo for San Jose.', priority:2 },

  { category:'outdoor-retail', name:'REI Co-op San Jose',  handle:'', followers:0, location:'San Jose, CA', lat:37.3540, lng:-121.9900, tags:'bayarea,rei,outdoor', instagram:'', notes:'REI outreach target for San Jose Trail Challenge.', priority:2 },

// ─── Storage ─────────────────────────────────────────────────────────────────

const STORE_KEY = 'st_partners_v2';

function loadPartners() {
  const stored = localStorage.getItem(STORE_KEY);
  if (stored) {
    try { return JSON.parse(stored); } catch(e) {}
  }
  const data = SEED.map((s, i) => ({ ...s, id: i + 1 }));
  savePartners(data);
  return data;
}

function savePartners(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

// ─── Helpers ─────────────────────────────────────────────────────────────────

function haversineMiles(lat1, lng1, lat2, lng2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtFollowers(n) {
  if (!n) return '';
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return Math.round(n/1000)+'K';
  return n.toString();
}

function nearestRace(p) {
  if (!p.lat || !p.lng) return null;
  let best = { race: RACES[0], miles: Infinity };
  RACES.forEach(r => {
    const miles = haversineMiles(p.lat, p.lng, r.lat, r.lng);
    if (miles < best.miles) best = { race: r, miles };
  });
  return best;
}

function catCfg(cat) {
  return CATEGORIES[cat] || CATEGORIES['other'];
}

// ─── State ───────────────────────────────────────────────────────────────────

let state = {
  partners: loadPartners(),
  search: '',
  selectedRace: null,
  maxMiles: 500,
  selectedId: null,
  showAdd: false,
  showFilters: false,
  activeCategories: new Set(), // empty = all
  addForm: { category:'influencer', name:'', handle:'', followers:'', location:'', lat:'', lng:'', tags:'', instagram:'', notes:'', priority:'1' },
};

let map = null;
let partnerMarkers = {};

// ─── Map ─────────────────────────────────────────────────────────────────────

function initMap() {
  map = L.map('map', { center: [38.5, -97], zoom: 4 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19,
  }).addTo(map);

  RACES.forEach(race => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:13px;height:13px;border-radius:50%;background:#81c9c0;border:2px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.7)"></div>`,
      iconSize: [13,13], iconAnchor: [6,6],
    });
    const pop = `<b style="color:#81c9c0;font-size:13px">${race.name}</b><br/><span style="color:#aaa;font-size:12px">${race.location}</span><br/><span style="color:#666;font-size:11px">${race.date}</span>${race.target ? `<br/><span style="color:#e2e2e2;font-size:12px">Target: <b>${race.target.toLocaleString()} runners</b></span>` : ''}`;
    L.marker([race.lat, race.lng], { icon }).addTo(map)
      .bindPopup(pop)
      .on('click', () => { state.selectedRace = race; state.showFilters = true; render(); });
  });

  updatePartnerMarkers();
}

function makePartnerIcon(partner) {
  const cfg = catCfg(partner.category);
  const followers = partner.followers || 0;
  const sz = followers >= 25000 ? 14 : followers >= 10000 ? 11 : 9;
  return L.divIcon({
    className: '',
    html: `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${cfg.color};border:2px solid rgba(255,255,255,.7);box-shadow:0 0 4px rgba(0,0,0,.5)"></div>`,
    iconSize: [sz,sz], iconAnchor: [sz/2,sz/2],
  });
}

function updatePartnerMarkers() {
  if (!map) return;
  Object.values(partnerMarkers).forEach(m => map.removeLayer(m));
  partnerMarkers = {};

  state.partners.forEach(p => {
    if (!p.lat || !p.lng) return;
    const cfg = catCfg(p.category);
    const nr = nearestRace(p);
    const followerLine = p.followers ? `<br/><span style="color:#81c9c0;font-size:12px"><b>${fmtFollowers(p.followers)}</b> followers</span>` : '';
    const nearestLine = nr ? `<br/><span style="color:#666;font-size:11px">Nearest: ${nr.race.name.split(' ').slice(0,3).join(' ')} (${Math.round(nr.miles)} mi)</span>` : '';
    const pop = `<b style="color:#e2e2e2;font-size:13px">${p.name}</b>${p.handle ? `<br/><span style="color:#81c9c0;font-size:11px">${p.handle}</span>` : ''}${followerLine}<br/><span style="font-size:11px;color:${cfg.color}">${cfg.label}</span><br/><span style="color:#888;font-size:11px">📍 ${p.location}</span>${nearestLine}`;
    const m = L.marker([p.lat, p.lng], { icon: makePartnerIcon(p) }).addTo(map)
      .bindPopup(pop)
      .on('click', () => { state.selectedId = p.id; render(); });
    partnerMarkers[p.id] = m;
  });
}

function flyTo(p) {
  if (!map || !p.lat || !p.lng) return;
  map.flyTo([p.lat, p.lng], 9, { duration: .9 });
  setTimeout(() => partnerMarkers[p.id]?.openPopup(), 950);
}

// ─── Filter Logic ─────────────────────────────────────────────────────────────

function filtered() {
  return state.partners.filter(p => {
    if (state.activeCategories.size > 0 && !state.activeCategories.has(p.category)) return false;
    const q = state.search.toLowerCase();
    if (q && !p.name.toLowerCase().includes(q) && !(p.handle||'').toLowerCase().includes(q) && !(p.location||'').toLowerCase().includes(q)) return false;
    if (state.selectedRace && p.lat && p.lng) {
      const miles = haversineMiles(p.lat, p.lng, state.selectedRace.lat, state.selectedRace.lng);
      if (miles > state.maxMiles) return false;
    }
    return true;
  });
}

        alt="Spartan Trail" style="height:28px;display:block;margin-bottom:10px"/>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div>
          <span style="font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--teal);text-transform:uppercase">Local Partner Map</span>
          <span class="badge badge-teal" style="margin-left:6px">${state.partners.length}</span>
        </div>
        <button class="btn-teal" onclick="openAdd()">+ Add</button>
      </div>
      <input type="text" placeholder="Search name, handle, or city…" value="${escAttr(state.search)}"
        oninput="state.search=this.value;render()" style="margin-bottom:0"/>
    </div>

    <!-- Category filters -->
    <div style="padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0">
      <div class="section-hd">Filter by Type</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${Object.entries(CATEGORIES).filter(([k]) => catCounts[k]).map(([k, cfg]) => {
          const on = state.activeCategories.has(k);
          return `<button class="pill-btn ${on?'on':''}"
            style="${on ? `background:${cfg.color}` : ''}"
            onclick="toggleCat('${k}')">${cfg.label} <span style="opacity:.7">${catCounts[k]||0}</span></button>`;
        }).join('')}
        ${state.activeCategories.size > 0
          ? `<button class="pill-btn" onclick="state.activeCategories=new Set();render()" style="color:#81c9c0;border-color:#81c9c033">✕ Clear</button>`
          : ''}
      </div>
    </div>

    <!-- Race proximity filter -->
    <div style="border-bottom:1px solid var(--border);flex-shrink:0">
      <button onclick="state.showFilters=!state.showFilters;render()"
        style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 14px;background:transparent;border:none;color:#999;font-size:12px;cursor:pointer">
        <span>📍 Race Proximity${state.selectedRace ? ` — <span style="color:var(--teal)">${state.selectedRace.name.split(' ').slice(0,3).join(' ')}</span>` : ''}</span>
        <span style="font-size:10px">${state.showFilters?'▲':'▼'}</span>
      </button>
      ${state.showFilters ? `
      <div style="padding:0 14px 12px;display:flex;flex-direction:column;gap:10px">
        <div>
          <label>Filter by Race</label>
          <select onchange="selectRace(this.value)">
            <option value="">All Locations</option>
            ${RACES.map(r => `<option value="${r.id}" ${state.selectedRace?.id===r.id?'selected':''}>${r.name} — ${r.location}</option>`).join('')}
          </select>
        </div>
        ${state.selectedRace ? `
        <div>
          <label>Within <b style="color:var(--teal)">${state.maxMiles} miles</b> of ${state.selectedRace.name.split(' ').slice(0,2).join(' ')}</label>
          <input type="range" class="range-input" min="50" max="1500" step="50" value="${state.maxMiles}"
            oninput="state.maxMiles=Number(this.value);render()"/>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:#555"><span>50 mi</span><span>1500 mi</span></div>
        </div>
        <button class="btn-ghost" onclick="clearRaceFilter()" style="font-size:11px;padding:4px 10px">Clear Race Filter</button>
        ` : ''}
      </div>` : ''}
    </div>

    <!-- List -->
    <div style="flex:1;overflow-y:auto;padding:10px 10px 4px">
      ${list.length === 0
        ? `<div style="text-align:center;color:#444;font-size:13px;padding:40px 0">No partners match these filters</div>`
        : list.map(p => {
            const cfg = catCfg(p.category);
            const nr = nearestRace(p);
            const sel = state.selectedId === p.id;
            return `
            <div class="partner-card ${sel?'selected':''}" onclick="selectPartner(${p.id})">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px">
                <div style="flex:1;min-width:0">
                  <span style="font-size:13px;font-weight:600;color:#e2e2e2">${escHtml(p.name)}</span>
                  ${p.handle ? `<span style="font-size:11px;color:#666;margin-left:6px">${escHtml(p.handle)}</span>` : ''}
                </div>
                ${p.followers ? `<div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:700;color:var(--teal)">${fmtFollowers(p.followers)}</div><div style="font-size:10px;color:#555">followers</div></div>` : ''}
              </div>
              <div style="display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-bottom:4px">
                <span class="badge ${cfg.cssClass}">${cfg.label}</span>
                ${p.priority===1 ? `<span class="badge" style="background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44">⭐ Priority</span>` : ''}
              </div>
              ${p.location ? `<div style="font-size:11px;color:#666">📍 ${escHtml(p.location)}</div>` : ''}
              ${nr ? `<div style="margin-top:4px"><span class="badge badge-outline" style="font-size:10px">Nearest: ${nr.race.name.split(' ').slice(0,3).join(' ')} (${Math.round(nr.miles)} mi)</span></div>` : ''}
              ${p.notes ? `<div style="font-size:11px;color:#555;font-style:italic;margin-top:5px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${escHtml(p.notes)}</div>` : ''}
              ${p.tags ? `<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px">${p.tags.split(',').map(t=>`<span class="badge badge-ghost">${escHtml(t.trim())}</span>`).join('')}</div>` : ''}
              ${p.instagram ? `<div style="margin-top:6px"><a href="${escAttr(p.instagram)}" target="_blank" style="font-size:11px;color:var(--teal);text-decoration:none">↗ Instagram</a></div>` : ''}
            </div>`;
          }).join('')}
    </div>

    <!-- Legend -->
    <div style="padding:9px 14px;border-top:1px solid var(--border);background:#171717;flex-shrink:0;font-size:10px;color:#555">
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:3px">
        ${Object.entries(CATEGORIES).filter(([k]) => catCounts[k]).map(([k,cfg]) =>
          `<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${cfg.color};vertical-align:middle;margin-right:3px"></span>${cfg.label}</span>`
        ).join('')}
      </div>
      <div>🔵 Race location &nbsp;·&nbsp; Dot size = follower count</div>
    </div>
  `;
}

function renderModal() {
  const existing = document.getElementById('add-modal');
  if (existing) existing.remove();
  if (!state.showAdd) return;

  const f = state.addForm;
  const el = document.createElement('div');
  el.id = 'add-modal';
  el.className = 'modal-overlay';
  el.innerHTML = `
    <div class="modal-box" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="margin:0;font-size:16px;font-weight:700">Add Local Partner</h3>
        <button onclick="closeAdd()" style="background:transparent;border:none;color:#aaa;cursor:pointer;font-size:22px;line-height:1">×</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label>Category *</label>
          <select id="af-category">
            ${Object.entries(CATEGORIES).map(([k,cfg]) => `<option value="${k}" ${f.category===k?'selected':''}>${cfg.label}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>Priority</label>
          <select id="af-priority">
            <option value="1" ${f.priority==='1'?'selected':''}>⭐ High Priority</option>
            <option value="2" ${f.priority==='2'?'selected':''}>Outreach</option>
          </select>
        </div>
        <div style="grid-column:span 2">
          <label>Name *</label>
          <input type="text" id="af-name" value="${escAttr(f.name)}" placeholder="Business or person name"/>
        </div>
        <div>
          <label>Instagram Handle</label>
          <input type="text" id="af-handle" value="${escAttr(f.handle)}" placeholder="@handle"/>
        </div>
        <div>
          <label>Followers</label>
          <input type="number" id="af-followers" value="${escAttr(f.followers)}" placeholder="e.g. 12000"/>
        </div>
        <div style="grid-column:span 2">
          <label>Location</label>
          <input type="text" id="af-location" value="${escAttr(f.location)}" placeholder="City, State"/>
        </div>
        <div>
          <label>Latitude</label>
          <input type="number" id="af-lat" value="${escAttr(f.lat)}" placeholder="e.g. 40.015" step="any"/>
        </div>
        <div>
          <label>Longitude</label>
          <input type="number" id="af-lng" value="${escAttr(f.lng)}" placeholder="e.g. -105.27" step="any"/>
        </div>
        <div style="grid-column:span 2">
          <label>Tags (comma-separated)</label>
          <input type="text" id="af-tags" value="${escAttr(f.tags)}" placeholder="trail,local,women"/>
        </div>
        <div style="grid-column:span 2">
          <label>Instagram URL</label>
          <input type="text" id="af-instagram" value="${escAttr(f.instagram)}" placeholder="https://instagram.com/..."/>
        </div>
        <div style="grid-column:span 2">
          <label>Notes</label>
          <textarea id="af-notes" rows="3" placeholder="Why this partner? Proximity to race, audience overlap, etc.">${escHtml(f.notes)}</textarea>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
        <button class="btn-ghost" onclick="closeAdd()">Cancel</button>
        <button class="btn-teal" onclick="savePartner()">Save Partner</button>
      </div>
    </div>
  `;
  el.addEventListener('click', closeAdd);
  document.body.appendChild(el);
}

function render() {
  renderSidebar();
  renderModal();
}

// ─── Escape helpers ───────────────────────────────────────────────────────────

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;');
}

// ─── Actions ─────────────────────────────────────────────────────────────────

function toggleCat(k) {
  if (state.activeCategories.has(k)) state.activeCategories.delete(k);
  else state.activeCategories.add(k);
  render();
}

function selectPartner(id) {
  const wasSelected = state.selectedId === id;
  state.selectedId = wasSelected ? null : id;
  if (!wasSelected) {
    const p = state.partners.find(x => x.id === id);
    if (p) flyTo(p);
  }
  render();
}

function selectRace(id) {
  const r = RACES.find(r => r.id === Number(id));
  state.selectedRace = r || null;
  if (r && map) map.flyTo([r.lat, r.lng], 6, { duration: .9 });
  render();
}

function clearRaceFilter() {
  state.selectedRace = null;
  state.maxMiles = 500;
  render();
}

function openAdd()  { state.showAdd = true; render(); }
function closeAdd() { state.showAdd = false; render(); }

function savePartner() {
  const name = document.getElementById('af-name').value.trim();
  if (!name) { alert('Name is required.'); return; }

  const p = {
    id: Math.max(0, ...state.partners.map(x => x.id)) + 1,
    category: document.getElementById('af-category').value,
    name,
    handle:    document.getElementById('af-handle').value.trim(),
    followers: parseInt(document.getElementById('af-followers').value) || 0,
    location:  document.getElementById('af-location').value.trim(),
    lat:       parseFloat(document.getElementById('af-lat').value) || 0,
    lng:       parseFloat(document.getElementById('af-lng').value) || 0,
    tags:      document.getElementById('af-tags').value.trim(),
    instagram: document.getElementById('af-instagram').value.trim(),
    notes:     document.getElementById('af-notes').value.trim(),
    priority:  parseInt(document.getElementById('af-priority').value) || 2,
  };

  state.partners.push(p);
  savePartners(state.partners);
  updatePartnerMarkers();
  state.showAdd = false;
  state.addForm = { category:'influencer', name:'', handle:'', followers:'', location:'', lat:'', lng:'', tags:'', instagram:'', notes:'', priority:'1' };
  render();
}

// ─── Init ────────────────────────────────────────────────────────────────────

document.getElementById('root').innerHTML = `<div id="sidebar"></div><div id="map"></div>`;
render();
initMap();
</script>
</body>
</html>
